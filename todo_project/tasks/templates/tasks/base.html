<!DOCTYPE html>
<html>
<head>
    <title>ToDo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="background-color: #e8f5e9;">

<style>
.card {
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-2px);
}
</style>

<nav class="navbar navbar-expand-lg px-3"
     style="background-color: #86f58b;">
    <div class="container-fluid">

        <!-- Levá část -->
        <div>
            <a class="navbar-brand fw-bold 
                text-dark 
                {% if request.path == '/' %}text-primary{% endif %}" 
                href="/">
                Moje úkoly
            </a>

            <a class="btn btn-outline-primary me-2 
                {% if request.path == '/add/' %}active{% endif %}" 
                href="{% url 'add_task' %}">
                Přidat úkol
            </a>

            <a class="btn btn-outline-secondary 
                {% if request.path == '/stats/' %}active{% endif %}" 
                href="/stats/">
                Statistiky
            </a>
        </div>

        <!-- Pravá část -->
        <div>
            {% if user.is_authenticated %}
                <span class="me-2">Přihlášen: {{ user.username }}</span>

                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button class="btn btn-danger btn-sm" type="submit">Odhlásit se</button>
                </form>
            {% endif %}
        </div>

    </div>
</nav>


<!-- OBSAH -->
<div class="container px-4 mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
