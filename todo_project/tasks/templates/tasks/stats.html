{% extends 'tasks/base.html' %}

{% block content %}

<h1>Statistiky</h1>

<div class="row mb-4">

    <div class="col-md-4">
        <div class="card shadow border-0 text-center p-3">
            <h5>Celkem úkolů</h5>
            <h2>{{ total_tasks }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow border-0 text-center p-3">
            <h5>Dokončeno</h5>
            <h2>{{ completed_tasks }}</h2>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card shadow border-0 text-center p-3">
            <h5>Rozpracováno</h5>
            <h2>{{ in_progress_tasks }}</h2>
        </div>
    </div>

</div>

<div class="row">

    <div class="col-md-6">
        <div class="card shadow border-0 p-3">
            <h5 class="text-center mb-3">
                Úkoly podle stavu
            </h5>

            <canvas id="statusChart"></canvas>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card shadow border-0 p-3">
            <h5 class="text-center mb-3">
                Úkoly podle priority
            </h5>

            <canvas id="priorityChart"></canvas>
        </div>
    </div>

</div>

<script>
    // STATUS CHART (koláčový)
    const statusChart = new Chart(document.getElementById('statusChart'), {
        type: 'pie',
        data: {
            labels: ['Zadáno', 'Rozpracováno', 'Dokončeno'],
            datasets: [{
                data: [{{ todo }}, {{ in_progress }}, {{ completed }}],
            }]
        }
    });

    // PRIORITY CHART (sloupcový)
    const priorityChart = new Chart(document.getElementById('priorityChart'), {
        type: 'bar',
        data: {
            labels: ['1', '2', '3', '4', '5'],
            datasets: [{
                label: 'Počet úkolů',
                data: {{ priority_counts }},
            }]
        }
    });
</script>

{% endblock %}
