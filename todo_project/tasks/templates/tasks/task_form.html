{% extends 'tasks/base.html' %}

{% block content %}

<div class="col-md-8 mx-auto">

    <div class="card shadow border-0 p-4">

        <h1 class="mb-4">
            {% if form.instance.pk %}
                Upravit úkol
            {% else %}
                Přidat úkol
            {% endif %}
        </h1>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label fw-bold">Název</label>
                {{ form.title }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Popis</label>
                {{ form.description }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Termín</label>
                {{ form.due_date }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Priorita</label>
                {{ form.priority }}
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold">Stav</label>
                {{ form.status }}
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold">Tagy</label>
                {{ form.tags }}
            </div>

            <button class="btn btn-success px-4" type="submit">

                {% if form.instance.pk %}
                    Uložit změny
                {% else %}
                    Přidat
                {% endif %}

            </button>

        </form>

    </div>

</div>

{% endblock %}
